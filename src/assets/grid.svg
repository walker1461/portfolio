<svg width="100%" height="100%" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Combined gradient (radial + vertical baked in) -->
        <radialGradient id="fade" cx="50%" cy="40%" r="70%">
            <stop offset="0%" stop-color="white" stop-opacity="0.12" />
            <stop offset="70%" stop-color="white" stop-opacity="0.05" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Background fade overlay -->
    <rect width="100%" height="100%" fill="url(#fade)" />

    <!-- Grid -->
    <g stroke="white" stroke-width="1" opacity="0.08">
        <!-- vertical -->
        <g>
            <line x1="0" y1="0" x2="0" y2="1000" />
            <line x1="80" y1="0" x2="80" y2="1000" />
            <line x1="160" y1="0" x2="160" y2="1000" />
            <line x1="240" y1="0" x2="240" y2="1000" />
            <line x1="320" y1="0" x2="320" y2="1000" />
            <line x1="400" y1="0" x2="400" y2="1000" />
            <line x1="480" y1="0" x2="480" y2="1000" />
            <line x1="560" y1="0" x2="560" y2="1000" />
            <line x1="640" y1="0" x2="640" y2="1000" />
            <line x1="720" y1="0" x2="720" y2="1000" />
            <line x1="800" y1="0" x2="800" y2="1000" />
            <line x1="880" y1="0" x2="880" y2="1000" />
            <line x1="960" y1="0" x2="960" y2="1000" />
        </g>

        <!-- horizontal -->
        <g>
            <line x1="0" y1="0" x2="1000" y2="0" />
            <line x1="0" y1="80" x2="1000" y2="80" />
            <line x1="0" y1="160" x2="1000" y2="160" />
            <line x1="0" y1="240" x2="1000" y2="240" />
            <line x1="0" y1="320" x2="1000" y2="320" />
            <line x1="0" y1="400" x2="1000" y2="400" />
            <line x1="0" y1="480" x2="1000" y2="480" />
            <line x1="0" y1="560" x2="1000" y2="560" />
            <line x1="0" y1="640" x2="1000" y2="640" />
            <line x1="0" y1="720" x2="1000" y2="720" />
            <line x1="0" y1="800" x2="1000" y2="800" />
            <line x1="0" y1="880" x2="1000" y2="880" />
            <line x1="0" y1="960" x2="1000" y2="960" />
        </g>
    </g>
</svg>